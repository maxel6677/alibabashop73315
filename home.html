<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    width:320px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:95%;
    padding:10px;
    margin-top:10px;
    border:none;
    background:#007BFF;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

a{
    color:#007BFF;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h2>Đăng ký tài khoản</h2>

<input type="text" id="ten" placeholder="Tên người dùng">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Mật khẩu">

<input type="password" id="password2" placeholder="Nhập lại mật khẩu">

<button onclick="dangKy()">Đăng ký</button>

<p>Đã có tài khoản?</p>

<button onclick="dangNhapGoogle()">
🔐 Đăng nhập bằng Google
</button>

</div>

<script>

function dangKy(){

let mk=document.getElementById("password").value;
let mk2=document.getElementById("password2").value;

if(mk!=mk2){
alert("Hai mật khẩu không giống nhau!");
return;
}

alert("Đăng ký thành công! (Sau này sẽ lưu bằng Firebase)");

window.location.href="home.html";

}

</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeiC8mBiJo5-NJ5Df4oBZSkDzCr3kmEAc",
  authDomain: "project-3470863119146495393.firebaseapp.com",
  projectId: "project-3470863119146495393",
  storageBucket: "project-3470863119146495393.firebasestorage.app",
  messagingSenderId: "965754888527",
  appId: "1:965754888527:web:5f2c0dd25ec20c4da3653a",
  measurementId: "G-DHW01RTG4M"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
getRedirectResult(auth)
.then((result) => {
    if (result && result.user) {
        alert("Đăng nhập thành công!");
        window.location.href = "index.html";
    }
})
.catch((error) => {
    alert(error.message);
});

onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "index.html";
    }
});
window.dangNhapGoogle = function () {
    signInWithRedirect(auth, provider);
};
</script>
<button onclick="dangXuat()">
🚪 Đăng xuất
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithRedirect,
  getRedirectResult,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeiC8mBiJo5-NJ5Df4oBZSkDzCr3kmEAc",
  authDomain: "project-3470863119146495393.firebaseapp.com",
  projectId: "project-3470863119146495393",
  storageBucket: "project-3470863119146495393.firebasestorage.app",
  messagingSenderId: "965754888527",
  appId: "1:965754888527:web:5f2c0dd25ec20c4da3653a",
  measurementId: "G-DHW01RTG4M"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Nút đăng nhập
window.dangNhapGoogle = function () {
    signInWithRedirect(auth, provider);
};

// Sau khi đăng nhập quay lại
getRedirectResult(auth)
.then((result) => {
    if (result && result.user) {
        alert("Đăng nhập thành công!");
        window.location.href = "index.html";
    }
})
.catch((error) => {
    alert(error.code + "\n" + error.message);
});

// Nếu đã đăng nhập thì tự chuyển
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "index.html";
    }
});

// Nút đăng xuất
window.dangXuat = function () {
    signOut(auth).then(() => {
        alert("Đã đăng xuất!");
    });
};
</script>

</button>
</body>
</html>
