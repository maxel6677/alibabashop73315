<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Code</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    transform: scale(0.85);
    transform-origin: top center;
}

/* ô nhập gift code */
#giftcode {
    width: 80%;
    max-width: 300px;
    height: 40px;
    font-size: 16px;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

/* nút */
button {
    padding: 10px 20px;
    border: none;
    background: #007BFF;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #0056b3;
}
</style>

</head>

<body>

<h2 style="text-align:center;">🔐 Gift Code</h2>

<div style="text-align:center; margin-top:20px;">

    <h3>Nhập Gift Code</h3>

    <input type="text" id="giftcode" placeholder="Nhập code...">

    <br><br>

    <button onclick="kiemTraCode()">Xác nhận</button>

</div>

<script>
function kiemTraCode() {
    let code = document.getElementById("giftcode").value.trim();

    if (code === "alibaba210") {
        window.location.href = "index02.html";
    } else {
        alert("❌ Sai gift code!");
    }
}
</script>

</body>
</html>
