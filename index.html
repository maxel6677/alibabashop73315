<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBeiC8mBiJo5-NJ5Df4oBZSkDzCr3kmEAc",
    authDomain: "project-3470863119146495393.firebaseapp.com",
    projectId: "project-3470863119146495393",
    storageBucket: "project-3470863119146495393.firebasestorage.app",
    messagingSenderId: "965754888527",
    appId: "1:965754888527:web:72b1af66753c129da3653a",
    measurementId: "G-P9NQVKJR97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addEventListener("load", () => {
    taiBinhLuan();
});

window.themBinhLuan = async function () {
    const input = document.getElementById("comment");
    const text = input.value.trim();

    if (!text) {
        alert("Vui lòng nhập bình luận!");
        return;
    }

    await addDoc(collection(db, "comments"), {
        text: text
    });

    input.value = "";
    taiBinhLuan();
};

async function taiBinhLuan() {
    const box = document.getElementById("danhSachBinhLuan");
    box.innerHTML = "";

    const snapshot = await getDocs(collection(db, "comments"));

    snapshot.forEach((item) => {
        const data = item.data();

        const div = document.createElement("div");
        div.className = "comment";

        const text = document.createElement("span");
        text.innerText = data.text;

        const btn = document.createElement("button");
        btn.innerText = "Xóa";
        btn.className = "delete-btn";

        btn.onclick = async () => {
            if (confirm("Xóa bình luận này?")) {
                await deleteDoc(doc(db, "comments", item.id));
                taiBinhLuan();
            }
        };

        div.appendChild(text);
        div.appendChild(btn);
        box.appendChild(div);
    });
}

window.xoaTatCa = async function () {
    if (!confirm("Xóa tất cả bình luận?")) return;

    const snapshot = await getDocs(collection(db, "comments"));

    for (const item of snapshot.docs) {
        await deleteDoc(doc(db, "comments", item.id));
    }

    taiBinhLuan();
};

window.muaHang = function () {
    if (confirm("Bạn muốn mua sản phẩm này?")) {
        alert("Cảm ơn bạn!");
    }
};
</script>
