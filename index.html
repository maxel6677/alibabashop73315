<script>

function muaHang() {
    window.location.href =
    "sms:0344851779?body=Tôi muốn mua Sổ tay tử thần giá 70.000đ";
}

function toggleMenu() {
    let menu = document.getElementById("menu");

    menu.style.display = (menu.style.display === "none") ? "block" : "none";
}

/* ===== BÌNH LUẬN LOCALSTORAGE ===== */

function loadBinhLuan() {
    let list = JSON.parse(localStorage.getItem("comments")) || [];
    let container = document.getElementById("danhSachBinhLuan");
    container.innerHTML = "";

    list.forEach(text => {
        let div = document.createElement("div");
        div.className = "comment";
        div.innerText = text;
        container.appendChild(div);
    });
}

function themBinhLuan() {
    let input = document.getElementById("comment");
    let text = input.value.trim();

    if(text === "") {
        alert("Vui lòng nhập bình luận!");
        return;
    }

    let list = JSON.parse(localStorage.getItem("comments")) || [];
    list.push(text);

    localStorage.setItem("comments", JSON.stringify(list));

    input.value = "";
    loadBinhLuan();
}

// chạy khi mở trang
loadBinhLuan();

</script>
