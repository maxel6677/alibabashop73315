<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alibabashop73315</title><style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f5f5f5;
    padding:20px;
}

img{
    width:300px;
    border-radius:10px;
}

button{
    padding:10px 15px;
    border:none;
    background:#007BFF;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#0056b3;
}
#comment{
    width:300px;
    height:80px;
}

.comment{

</style></head><body><h1>🛒 Alibabashop73315</h1><img src="https://images-na.ssl-images-amazon.com/images/I/41yiWNK-pCL._SL500_._AC_SL500_.jpg"><h2>Sổ tay tử thần</h2>
<p>Giá: 70.000đ</p><button onclick="muaHang()">Mua ngay</button>

<hr><h2>Bình luận</h2><textarea id="comment" placeholder="Nhập bình luận..."></textarea><br><button onclick="themBinhLuan()">Gửi</button>

<div id="danhSachBinhLuan"></div><script>
function muaHang() {
    window.location.href =
    "sms:0344851779?body=Tôi muốn mua Sổ tay tử thần giá 70.000đ";
}
function toggleMenu() {
let menu = document.getElementById("menu");

if(menu.style.display === "none") {
    menu.style.display = "block";
} else {
    menu.style.display = "none";
}

}
function themBinhLuan() {
    let input = document.getElementById("comment");
    let text = input.value.trim();

    if(text === "") {
        alert("Vui lòng nhập bình luận!");
        return;
    }

    let div = document.createElement("div");
    div.className = "comment";
    div.innerText = text;

    document.getElementById("danhSachBinhLuan")
            .appendChild(div);

    input.value = "";
}
</script></body>
</html>
