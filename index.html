<!DOCTYPE html>
<html>
<head>
    <title>Alibabashop73315</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        img {
            border-radius: 10px;
        }

        button {
            padding: 10px 15px;
            background: orange;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: darkorange;
        }

        .comment {
            background: white;
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            display: inline-block;
            min-width: 250px;
        }

        .delete-btn {
            margin-left: 10px;
            background: red;
            color: white;
            padding: 5px 8px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<h1>🛒 Alibabashop73315</h1>

<img src="https://images-na.ssl-images-amazon.com/images/I/41yiWNK-pCL._SL500_._AC_SL500_.jpg"
     width="300">

<h2>Sổ tay tử thần</h2>
<p>Giá: 70.000đ</p>

<button onclick="muaHang()">Mua ngay</button>

<hr>

<h2>Bình luận</h2>

<textarea id="comment" rows="4" cols="50" placeholder="Nhập bình luận..."></textarea>
<br>

<button onclick="themBinhLuan()">Gửi</button>
<button onclick="xoaTatCa()">Xóa tất cả bình luận</button>

<div id="danhSachBinhLuan"></div>

<script>
let comments = JSON.parse(localStorage.getItem("comments")) || [];

window.onload = function() {
    renderComments();
};

function saveComments() {
    localStorage.setItem("comments", JSON.stringify(comments));
}

function renderComments() {
    let box = document.getElementById("danhSachBinhLuan");
    box.innerHTML = "";

    comments.forEach((c, index) => {
        let div = document.createElement("div");
        div.className = "comment";

        let text = document.createElement("span");
        text.innerText = c.text;

        let del = document.createElement("button");
        del.innerText = "Xóa";
        del.className = "delete-btn";

        del.onclick = function() {
            if(confirm("Xóa bình luận này?")) {
                comments.splice(index, 1);
                saveComments();
                renderComments();
            }
        };

        div.appendChild(text);
        div.appendChild(del);

        box.appendChild(div);
    });
}

function themBinhLuan() {
    let input = document.getElementById("comment");
    let text = input.value;

    if(text.trim() === "") {
        alert("Vui lòng nhập bình luận!");
        return;
    }

    comments.push({ text: text });
    saveComments();
    renderComments();

    input.value = "";
}

function xoaTatCa() {
    if(confirm("Bạn có chắc muốn xóa tất cả bình luận không?")) {
        comments = [];
        localStorage.removeItem("comments");
        renderComments();
    }
}

function muaHang() {
    if(confirm("Bạn muốn mua sản phẩm này?")) {
        alert("Cảm ơn bạn!");
    }
}
</script>

</body>
</html>
