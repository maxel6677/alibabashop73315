<script>
let isSending = false;

async function datHang() {

  if (isSending) return; // chặn spam
  isSending = true;

  try {
    let ten = document.getElementById("ten").value.trim();
    let sdt = document.getElementById("sdt").value.trim();
    let diachi = document.getElementById("diachi").value.trim();

    if (!ten || !sdt || !diachi) {
      alert("Vui lòng nhập đầy đủ thông tin!");
      isSending = false;
      return;
    }

    let ship = Number(document.getElementById("ship").value);
    let coupon = document.getElementById("coupon").value.trim();

    let gia = 2500000;
    let giamgia = 0;

    if (coupon === "SALE50") {
      giamgia = 50000;
    }

    let tong = gia + ship - giamgia;

    let data = {
      ten: ten,
      sdt: sdt,
      diachi: diachi,
      sanpham: "Kính viễn vọng GENUO",
      gia: gia,
      phivanchuyen: ship,
      magiamgia: giamgia,
      tong: tong,
      thanhtoan: document.getElementById("pay").value
    };

    let res = await fetch("https://script.google.com/macros/s/AKfycbz9eLJifdxW_fOdzeIOYfsfVhgdAehTcnHfFYUgJdb4nVLyHRx4nUc9tF0fnKBkykahAw/exec", {
      method: "POST",
      body: JSON.stringify(data),
      headers: {
        "Content-Type": "application/json"
      }
    });

    let text = await res.text();

    console.log("Server response:", text);

    alert("Đặt hàng thành công!");

  } catch (err) {
    console.error(err);
    alert("Lỗi gửi đơn! Kiểm tra lại kết nối hoặc URL Web App.");
  }

  isSending = false;
}
</script>
