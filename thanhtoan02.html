<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.box {
  background: #fff;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  box-sizing: border-box;
}

/* Khung chứa ô địa chỉ và nút bản đồ */
.diachi-container {
  display: flex;
  gap: 5px;
  margin-top: 5px;
}
.diachi-container input {
  margin-top: 0;
  flex: 1;
}
.btn-map {
  padding: 10px;
  background: #4285F4;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 4px;
  white-space: nowrap;
}

button.btn-submit {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  font-size: 16px;
  cursor: pointer;
  border-radius: 8px;
}

button.btn-submit:hover {
  background: darkgreen;
}

/* Cấu hình cửa sổ Bản đồ ẩn/hiện */
#mapModal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.5);
}
.modal-content {
  background-color: white;
  margin: 10% auto;
  padding: 20px;
  width: 90%;
  max-width: 500px;
  border-radius: 10px;
}
#map {
  width: 100%;
  height: 300px;
  margin-top: 10px;
  border: 1px solid #ccc;
}
.modal-buttons {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}
</style>
</head>

<body>

<h2>🧾 Thanh toán đơn hàng</h2>

<div class="box">
  <h3>📍 Thông tin nhận hàng</h3>
  <input id="ten" placeholder="Tên người nhận">
  <input id="sdt" placeholder="Số điện thoại">
  
  <div class="diachi-container">
    <input id="diachi" placeholder="Địa chỉ hoặc Tọa độ nhận hàng">
    <button type="button" class="btn-map" onclick="moBanDo()">📍 Chọn từ bản đồ</button>
  </div>
</div>

<div class="box">
  <h3>📦 Sản phẩm</h3>
  <p><b>Kính viễn vọng GENUO</b></p>
  <p>Giá: 2.500.000 VNĐ</p>
</div>

<div class="box">
  <h3>🚚 Vận chuyển</h3>
  <select id="ship">
    <option value="30000">Tiêu chuẩn - 30.000</option>
    <option value="50000">Nhanh - 50.000</option>
  </select>
</div>

<div class="box">
  <h3>🎟 Mã giảm giá</h3>
  <input id="coupon" placeholder="Nhập mã (SALE50)">
</div>

<div class="box">
  <h3>💳 Thanh toán</h3>
  <select id="pay">
    <option value="COD">Thanh toán khi nhận hàng</option>
    <option value="BANK">Chuyển khoản</option>
  </select>
</div>

<div class="box">
  <h3>💰 Tổng chi phí</h3>
  <p id="totalText">Đang tính...</p>
</div>

<button class="btn-submit" onclick="datHang()">ĐẶT HÀNG</button>

<div id="mapModal">
  <div class="modal-content">
    <h4>Chọn vị trí giao hàng</h4>
    <p style="font-size:12px; color:gray;">Di chuyển bản đồ và bấm chọn vị trí chính xác của bạn.</p>
    <div id="map"></div>
    <div class="modal-buttons">
      <button onclick="xacNhanToaDo()" style="background:green; color:white; padding:10px; flex:1; border:none; border-radius:5px;">Xác nhận</button>
      <button onclick="dongBanDo()" style="background:red; color:white; padding:10px; flex:1; border:none; border-radius:5px;">Hủy</button>
    </div>
  </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDBcSBjapfcWVB9Hrl_A03LCoCvMIQFhnY&callback=initMap" async defer></script>

<script>
const gia = 2500000;
let map;
let marker;
let selectedCoords = "";

// Khởi tạo bản đồ mặc định lấy vị trí Việt Nam
function initMap() {
  const defaultLoc = { lat: 10.762622, lng: 106.660172 }; // Tọa độ TP.HCM làm mẫu
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: defaultLoc,
  });

  marker = new google.maps.Marker({
    position: defaultLoc,
    map: map,
    draggable: true // Cho phép kéo thả ghim
  });

  // Sự kiện khi click vào một điểm trên bản đồ
  google.maps.event.addListener(map, 'click', function(event) {
    marker.setPosition(event.latLng);
    luuToaDo(event.latLng);
  });

  // Sự kiện khi kéo thả ghim
  google.maps.event.addListener(marker, 'dragend', function(event) {
    luuToaDo(event.latLng);
  });
}

function luuToaDo(latLng) {
  selectedCoords = latLng.lat().toFixed(6) + ", " + latLng.lng().toFixed(6);
}

function moBanDo() {
  document.getElementById("mapModal").style.display = "block";
  // Kích hoạt lại kích thước map khi mở popup để tránh lỗi hiển thị xám màn hình
  setTimeout(() => {
    google.maps.event.trigger(map, 'resize');
    map.setCenter(marker.getPosition());
  }, 300);
}

function dongBanDo() {
  document.getElementById("mapModal").style.display = "none";
}

function xacNhanToaDo() {
  if(selectedCoords === "") {
    let currentPos = marker.getPosition();
    selectedCoords = currentPos.lat().toFixed(6) + ", " + currentPos.lng().toFixed(6);
  }
  document.getElementById("diachi").value = selectedCoords;
  dongBanDo();
}

function tinhTien() {
  let ship = Number(document.getElementById("ship").value);
  let coupon = document.getElementById("coupon").value;
  let giamgia = (coupon === "SALE50") ? 50000 : 0;
  let tong = gia + ship - giamgia;
  document.getElementById("totalText").innerText = tong.toLocaleString() + " VNĐ";
  return {ship, giamgia, tong};
}

document.getElementById("ship").onchange = tinhTien;
document.getElementById("coupon").oninput = tinhTien;
tinhTien();

async function datHang() {
  let ten = document.getElementById("ten").value;
  let sdt = document.getElementById("sdt").value;
  let diachi = document.getElementById("diachi").value;

  if (!ten || !sdt || !diachi) {
    alert("Vui lòng nhập đầy đủ thông tin!");
    return;
  }

  let calc = tinhTien();
  let data = {
    ten: ten,
    sdt: sdt,
    diachi: diachi,
    sanpham: "Kính viễn vọng GENUO",
    gia: gia,
    phivanchuyen: calc.ship,
    magiamgia: calc.giamgia,
    tong: calc.tong,
    thanhtoan: document.getElementById("pay").value
  };

  try {
    let res = await fetch("https://script.google.com/macros/s/AKfycbwoC8H-yRkVyz8cPiMDIecu63KO5-5uzkLvF3wuKJgnlw69pWo3yxQOGOm39fu8JdXt/exec", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data),
      headers: {
        "Content-Type": "text/plain"
      }
    });

    alert("Đặt hàng thành công!");
    document.getElementById("ten").value = "";
    document.getElementById("sdt").value = "";
    document.getElementById("diachi").value = "";
  } catch (err) {
    alert("Lỗi gửi đơn!");
    console.log(err);
  }
}
</script>

</body>
</html>
