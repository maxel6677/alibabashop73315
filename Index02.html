<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cờ vua AI</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#222;
    color:white;
    text-align:center;
}

header{
    background:#111;
    padding:15px;
    font-size:28px;
    font-weight:bold;
}

#board{
    width:400px;
    height:400px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(8,1fr);
    border:5px solid #333;
}

.square{
    width:50px;
    height:50px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    cursor:pointer;
}

.white{
    background:#f0d9b5;
}

.black{
    background:#b58863;
}

.panel{
    margin-top:15px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#2196F3;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1976D2;
}

#status{
    margin-top:10px;
    font-size:18px;
}
</style>
</head>

<body>

<header>♟️ Cờ vua AI</header>

<div id="board"></div>

<div class="panel">
<button>▶ Chơi với AI</button>
<button>👥 Hai người</button>
<button>🔄 Chơi lại</button>
</div>

<p id="status">Lượt: Trắng</p>

<script>
const board = document.getElementById("board");

const pieces = [
["♜","♞","♝","♛","♚","♝","♞","♜"],
["♟","♟","♟","♟","♟","♟","♟","♟"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["♙","♙","♙","♙","♙","♙","♙","♙"],
["♖","♘","♗","♕","♔","♗","♘","♖"]
];

for(let y=0;y<8;y++){

    for(let x=0;x<8;x++){

        const cell=document.createElement("div");

        cell.className="square "+((x+y)%2==0?"white":"black");

        cell.innerHTML=pieces[y][x];

        board.appendChild(cell);

    }

}
</script>

</body>
</html>
