<!-- Nút mở -->
<button onclick="hienThongTin()">📱 Thông tin thiết bị</button>

<!-- Popup -->
<div id="deviceModal" style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
z-index:9999;
">

<div style="
background:#fff;
width:90%;
max-width:420px;
margin:10% auto;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,.3);
">

<h2 style="margin-top:0;">📱 Thông tin thiết bị</h2>

<p><b>🌐 Trình duyệt:</b><br><span id="browser"></span></p>

<p><b>💻 Hệ điều hành:</b><br><span id="platform"></span></p>

<p><b>🧠 CPU:</b><br><span id="cpu"></span></p>

<p><b>💾 RAM:</b><br><span id="ram"></span></p>

<p><b>🖥️ Độ phân giải:</b><br><span id="screenSize"></span></p>

<p><b>🌍 Ngôn ngữ:</b><br><span id="language"></span></p>

<button onclick="dongThongTin()"
style="
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-size:16px;
">
Đóng
</button>

</div>
</div>

<script>
function hienThongTin(){

document.getElementById("deviceModal").style.display="block";

browser.innerText=navigator.userAgent;
platform.innerText=navigator.platform;
language.innerText=navigator.language;

cpu.innerText=navigator.hardwareConcurrency
? navigator.hardwareConcurrency+" lõi"
: "Không hỗ trợ";

ram.innerText=navigator.deviceMemory
? navigator.deviceMemory+" GB"
: "Không hỗ trợ";

screenSize.innerText=screen.width+" × "+screen.height;

}

function dongThongTin(){
document.getElementById("deviceModal").style.display="none";
}
</script>
